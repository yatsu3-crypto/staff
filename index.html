<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>生活指導アシスタント</title>
<style>
:root{
  --g:#3d6b5e;--g2:#5a9e8a;--gl:#d4ebe4;--gd:#2b4f45;
  --bg:#f5f2ed;--card:#fff;--bd:#e2dbd0;
  --tx:#1a1714;--tx2:#5a5450;--tx3:#9a928a;
  --tc:#0f6e56;--wbg:#fff8f2;--wbd:#f0c8a0;--wtx:#7a3a10;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic','Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}

/* ヘッダー */
.hdr{background:var(--g);color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:99;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.hdr-icon{width:38px;height:38px;background:rgba(255,255,255,.16);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.hdr h1{font-size:16px;font-weight:600;}
.hdr p{font-size:11px;opacity:.75;margin-top:1px;}

/* ページ切り替え */
.page{display:none;padding:14px 13px;max-width:540px;margin:0 auto;}
.page.active{display:block;}

/* カード */
.card{background:var(--card);border-radius:13px;border:.5px solid var(--bd);overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.06);margin-bottom:13px;}
.card-hd{padding:10px 15px;background:#f0ece4;border-bottom:.5px solid var(--bd);font-size:12px;font-weight:600;color:var(--g);display:flex;align-items:center;gap:6px;}
.dot{width:7px;height:7px;background:var(--g);border-radius:50%;}
.card-body{padding:14px 15px;}

/* 疾患ボタングリッド */
.dis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
@media(max-width:380px){.dis-grid{grid-template-columns:repeat(2,1fr);}}
.dis-btn{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:10px 6px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;text-align:center;line-height:1.3;transition:all .15s;min-height:44px;display:flex;align-items:center;justify-content:center;}
.dis-btn:active{transform:scale(.96);}
.dis-btn.sel{background:var(--g);color:#fff;border-color:var(--g);}

/* 追加入力 */
.extra-row{display:flex;flex-direction:column;gap:10px;}
.field-lbl{font-size:11px;font-weight:600;color:var(--tx2);letter-spacing:.04em;margin-bottom:5px;}
.tag-box{border:1px solid var(--bd);border-radius:8px;padding:7px 9px;min-height:60px;background:#faf9f6;display:flex;flex-wrap:wrap;gap:5px;align-content:flex-start;cursor:text;}
.tag-box:focus-within{border-color:var(--g2);background:#fff;}
.tag{display:inline-flex;align-items:center;gap:3px;background:var(--gl);color:var(--tc);border-radius:20px;padding:3px 8px 3px 10px;font-size:12px;font-weight:500;}
.tdel{background:none;border:none;color:var(--tc);font-size:14px;opacity:.5;cursor:pointer;padding:0 1px;line-height:1;}
.tdel:active{opacity:1;}
.tinp{border:none;outline:none;background:transparent;font-size:13px;color:var(--tx);min-width:70px;flex:1;font-family:inherit;}

/* タブナビ */
.tab-nav{display:flex;background:var(--gd);padding:0 13px;}
.tab-btn{flex:1;padding:11px 6px;font-size:13px;font-weight:600;color:rgba(255,255,255,.6);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;letter-spacing:.03em;}
.tab-btn.active{color:#fff;border-bottom-color:#fff;}
/* 生成ボタン */
.gen-btn{width:100%;background:var(--g);color:#fff;border:none;border-radius:50px;padding:15px;font-size:15px;font-weight:600;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;margin-top:4px;}
.gen-btn:active{background:var(--gd);transform:scale(.98);}
/* 製品グリッド */
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.prod-btn{background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:13px 10px;font-size:12px;font-weight:500;color:var(--tx2);cursor:pointer;text-align:center;line-height:1.4;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.prod-btn:active{transform:scale(.96);}
.prod-icon{font-size:22px;display:block;margin-bottom:5px;}
.prod-tag{display:inline-block;background:var(--gl);color:var(--tc);border-radius:4px;padding:2px 8px;font-size:10.5px;font-weight:600;margin-right:4px;margin-bottom:4px;}
.prod-section{margin-bottom:14px;}
.prod-section-ttl{font-size:12px;font-weight:600;color:var(--g);margin-bottom:6px;padding-bottom:4px;border-bottom:.5px solid var(--bd);}
.prod-item{display:flex;gap:7px;font-size:12.5px;line-height:1.65;color:var(--tx);margin-bottom:5px;}
.prod-item::before{content:"✓";color:var(--g2);flex-shrink:0;font-weight:600;}
.prod-name{font-size:16px;font-weight:700;color:var(--g);margin-bottom:4px;}
.prod-sub{font-size:11.5px;color:var(--tx2);margin-bottom:12px;line-height:1.5;}

/* 結果 */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:13px;padding-bottom:12px;border-bottom:.5px solid var(--bd);}
.chip{background:#f0ece4;border-radius:5px;padding:3px 9px;font-size:11px;color:var(--tx2);}
.chip b{color:var(--g);}
.sec{border-left:3px solid var(--g2);padding-left:13px;margin-bottom:15px;}
.sec-ttl{font-size:14px;font-weight:600;color:var(--g);margin-bottom:7px;}
.sec ul{list-style:none;display:flex;flex-direction:column;gap:6px;}
.sec li{display:flex;gap:7px;font-size:13px;line-height:1.65;color:var(--tx);align-items:flex-start;}
.sec li.unchecked{opacity:0.4;}
.chk{width:18px;height:18px;border:1.5px solid var(--g2);border-radius:4px;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:white;transition:all .15s;}
.chk.on{background:var(--g);border-color:var(--g);}
.chk.on::after{content:'✓';color:white;font-size:12px;font-weight:700;}
.li-txt{flex:1;}
/* 印刷ボタン */
.print-btn{width:100%;background:#2b6cb0;color:#fff;border:none;border-radius:50px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:8px;}
.print-btn:active{background:#1a4f8a;transform:scale(.98);}
/* 印刷スタイル */
@media print{
  body *{visibility:hidden;}
  #print-area,#print-area *{visibility:visible;}
  #print-area{position:absolute;top:0;left:0;width:100%;padding:20px;}
  .sec li.unchecked{display:none!important;}
  .add-box{display:none!important;}
  .chk{display:none!important;}
  .sec-ttl{font-size:13px;color:#3d6b5e;}
  .sec li{font-size:12px;}
  .sec{border-left:2px solid #3d6b5e;margin-bottom:12px;}
  .print-header{display:block!important;}
}
.print-header{display:none;font-size:13px;color:#333;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #ccc;}
.add-box{background:#eef6f2;border-radius:8px;padding:12px 13px;margin-bottom:14px;}
.add-ttl{font-size:13px;font-weight:600;color:var(--g);margin-bottom:8px;}
.add-row{display:flex;align-items:flex-start;gap:7px;margin-bottom:6px;font-size:12.5px;line-height:1.55;}
.add-row:last-child{margin-bottom:0;}
.badge{background:var(--gl);color:var(--tc);border-radius:4px;padding:1px 7px;font-size:10.5px;font-weight:600;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.warn{background:var(--wbg);border:.5px solid var(--wbd);border-radius:8px;padding:10px 13px;font-size:11.5px;color:var(--wtx);line-height:1.65;margin-top:4px;}
.warn b{display:block;margin-bottom:3px;}
.back-btn{width:100%;background:none;border:1px solid var(--bd);border-radius:50px;padding:12px;font-size:13px;color:var(--tx2);cursor:pointer;margin-top:4px;}
.back-btn:active{background:var(--bg);}
.err{padding:10px 13px;background:#fff0f0;border:.5px solid #f5c0c0;border-radius:8px;font-size:12px;color:#c0392b;margin-bottom:10px;display:none;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-icon">🩺</div>
  <div><h1>やまもと皮膚科・漢方クリニック</h1><p>生活指導・当院製品のご案内</p></div>
</div>
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('guidance')">⚕ 生活指導</button>
  <button class="tab-btn" onclick="switchTab('products')">🌿 当院製品</button>
</div>

<!-- 入力ページ -->
<div class="page active" id="pg-input">

  <div class="card">
    <div class="card-hd"><span class="dot"></span>疾患を選択（複数可）</div>
    <div class="card-body">
      <div class="dis-grid" id="dis-grid"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-hd"><span class="dot"></span>追加情報（任意）</div>
    <div class="card-body">
      <div class="extra-row">
        <div>
          <div class="field-lbl">症状・部位</div>
          <div class="tag-box" id="wb-s" onclick="fi('s')"><input class="tinp" id="ti-s" placeholder="例：頭皮の痒み　Enterで追加"></div>
        </div>
        <div>
          <div class="field-lbl">原因・誘因</div>
          <div class="tag-box" id="wb-c" onclick="fi('c')"><input class="tinp" id="ti-c" placeholder="例：汗、マラセチア"></div>
        </div>
        <div>
          <div class="field-lbl">現在の治療</div>
          <div class="tag-box" id="wb-t" onclick="fi('t')"><input class="tinp" id="ti-t" placeholder="例：ステロイド外用"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="err" id="err-msg"></div>
  <button class="gen-btn" onclick="generate()">⚕ 生活指導を生成する</button>
</div>

<!-- 製品一覧ページ -->
<div class="page" id="pg-products">
  <div class="card">
    <div class="card-hd"><span class="dot"></span>当院採用製品</div>
    <div class="card-body">
      <div class="prod-grid" id="prod-grid"></div>
    </div>
  </div>
</div>

<!-- 製品詳細ページ -->
<div class="page" id="pg-prod-detail">
  <div class="card">
    <div class="card-hd"><span class="dot"></span>製品詳細</div>
    <div class="card-body" id="prod-detail-body"></div>
    <div style="padding:4px 15px 15px;">
      <button class="back-btn" onclick="goBackProd()">← 製品一覧に戻る</button>
    </div>
  </div>
</div>

<!-- 結果ページ -->
<div class="page" id="pg-result">
  <div class="card">
    <div class="card-hd"><span class="dot"></span>生活指導・患者指導</div>
    <div class="card-body">
      <div class="print-header" id="print-header"></div>
      <div id="print-area">
        <div class="chips no-print" id="r-chips"></div>
        <div id="r-body"></div>
      </div>
      <div class="warn no-print"><b>⚠ 医師・医療者向け補助ツール</b>この内容はルールベースで生成した参考情報です。実際の診療・患者指導は医師の判断に基づき行ってください。</div>
    </div>
    <div style="padding:4px 15px 15px;">
      <button class="print-btn no-print" onclick="printResult()">🖨 チェックした項目を印刷する</button>
      <button class="back-btn no-print" onclick="goBack()">← 入力に戻る</button>
    </div>
  </div>
</div>

function initButtons(){
  var grid = document.getElementById('dis-grid');
  Object.keys(DB).forEach(function(d){
    var btn = document.createElement('button');
    btn.className = 'dis-btn';
    btn.textContent = d;
    btn.dataset.dis = d;
    btn.addEventListener('click', function(){
      if(selected[d]){ delete selected[d]; btn.classList.remove('sel'); }
      else { selected[d] = true; btn.classList.add('sel'); }
    });
    grid.appendChild(btn);
  });
}

// ==============================================
// タグ入力
// ==============================================
['s','c','t'].forEach(function(f){
  var inp = document.getElementById('ti-' + f);
  inp.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ e.preventDefault(); commitTag(f); }
    else if(e.key === 'Backspace' && inp.value === '' && tags[f].length){
      tags[f].pop(); renderTags(f);
    }
  });
  inp.addEventListener('input', function(){
    var v = inp.value;
    if(/[、，,\n]/.test(v)){
      v.split(/[、，,\n]/).forEach(function(p){ p = p.trim(); if(p && tags[f].indexOf(p)<0) tags[f].push(p); });
      inp.value = ''; renderTags(f);
    }
  });
});
function fi(f){ document.getElementById('ti-'+f).focus(); }
function commitTag(f){
  var inp = document.getElementById('ti-'+f);
  var v = inp.value.replace(/[、，,\s]/g,'').trim();
  if(v && tags[f].indexOf(v)<0) tags[f].push(v);
  inp.value = ''; renderTags(f);
}
function renderTags(f){
  var wrap = document.getElementById('wb-'+f);
  var inp = document.getElementById('ti-'+f);
  wrap.querySelectorAll('.tag').forEach(function(el){ el.remove(); });
  tags[f].forEach(function(t,i){
    var el = document.createElement('span');
    el.className = 'tag';
    el.innerHTML = esc(t) + '<button class="tdel" onclick="delTag(\''+f+'\','+i+')">×</button>';
    wrap.insertBefore(el, inp);
  });
}
function delTag(f,i){ tags[f].splice(i,1); renderTags(f); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// 生成
// ==============================================
function dedup(a){ var s=[]; a.forEach(function(x){ if(s.indexOf(x)<0) s.push(x); }); return s; }

function generate(){
  ['s','c','t'].forEach(function(f){ commitTag(f); });
  var disList = Object.keys(selected);
  var hasInput = disList.length || tags.s.length || tags.c.length || tags.t.length;
  if(!hasInput){
    var err = document.getElementById('err-msg');
    err.textContent = '疾患を選択するか、症状・原因・治療を入力してください。';
    err.style.display = '';
    return;
  }
  document.getElementById('err-msg').style.display = 'none';

  var care=[], life=[], night=[], env=[], add=[], treat=COMMON_TREAT.slice();

  disList.forEach(function(d){
    var r = DB[d];
    if(r.care) r.care.forEach(function(x){ care.push(x); });
    if(r.life) r.life.forEach(function(x){ life.push(x); });
    if(r.night) r.night.forEach(function(x){ night.push(x); });
    if(r.env) r.env.forEach(function(x){ env.push(x); });
    if(r.add) r.add.forEach(function(x){ add.push(x); });
  });

  // 自由入力テキストから治療ヒント追加
  var free = tags.s.concat(tags.c).concat(tags.t).join(' ');
  if(free.indexOf('ステロイド')>=0)
    treat.push('ステロイド外用：入浴後清潔な状態で塗布。1FTU（人差し指第一関節分）= 手のひら2枚分が目安。改善後はプロアクティブ療法（週2〜3回）へ移行を検討');
  if(free.indexOf('保湿')>=0)
    treat.push('保湿剤は1日2回（入浴後5分以内＋朝）。少しテカテカする程度の量が目安');
  if(free.indexOf('抗ヒスタミン')>=0)
    treat.push('抗ヒスタミン薬：眠気が出る場合は就寝前服用。自己判断で中止しない');

  if(night.length===0) night=['就寝時は通気性の良い綿素材のパジャマ・寝具を使用する','爪を短く切り、掻破による皮膚損傷・感染を予防する'];
  life = life.concat(COMMON_LIFE);

  // チップ
  var chips = '';
  disList.forEach(function(v){ chips += '<span class="chip"><b>疾患</b> '+esc(v)+'</span>'; });
  tags.s.forEach(function(v){ chips += '<span class="chip"><b>症状</b> '+esc(v)+'</span>'; });
  tags.c.forEach(function(v){ chips += '<span class="chip"><b>原因</b> '+esc(v)+'</span>'; });
  tags.t.forEach(function(v){ chips += '<span class="chip"><b>治療</b> '+esc(v)+'</span>'; });
  document.getElementById('r-chips').innerHTML = chips;

  // 本文
  var html = '';
  html += sec('🧼','日常ケア（清潔・保湿）', dedup(care).slice(0,6));
  html += sec('💊','薬の使い方・タイミング', dedup(treat).slice(0,5));
  html += sec('🌙','夜間・睡眠中の注意点', dedup(night).slice(0,4));
  html += sec('🏃','生活習慣', dedup(life).slice(0,5));
  html += sec('🏠','環境調整', dedup(env).slice(0,5));

  // 追加治療（重複除去）
  var addKeys = []; var addDedup = [];
  add.forEach(function(a){
    var k = a.b+'|'+a.t;
    if(addKeys.indexOf(k)<0){ addKeys.push(k); addDedup.push(a); }
  });
  addDedup = addDedup.slice(0,8);
  if(addDedup.length){
    html += '<div class="add-box"><div class="add-ttl">➕ 追加で考慮すべき治療・薬剤</div>';
    addDedup.forEach(function(a){
      html += '<div class="add-row"><span class="badge">'+esc(a.b)+'</span><span>'+esc(a.t)+'</span></div>';
    });
    html += '</div>';
  }

  document.getElementById('r-body').innerHTML = html;
  document.getElementById('pg-input').classList.remove('active');
  document.getElementById('pg-result').classList.add('active');
  window.scrollTo(0,0);
}

function sec(icon, title, items){
  if(!items||!items.length) return '';
  var h = '<div class="sec"><div class="sec-ttl">'+icon+' '+esc(title)+'</div><ul>';
  items.forEach(function(it,i){
    var uid = 'chk_'+Math.random().toString(36).slice(2,8);
    h += '<li id="li_'+uid+'" class="unchecked">';
    h += '<span class="chk" id="'+uid+'" onclick="toggleChk(\''+uid+'\')"></span>';
    h += '<span class="li-txt">'+esc(it)+'</span>';
    h += '</li>';
  });
  return h + '</ul></div>';
}

function toggleChk(uid){
  var chk = document.getElementById(uid);
  var li = document.getElementById('li_'+uid);
  if(chk.classList.contains('on')){
    chk.classList.remove('on');
    li.classList.add('unchecked');
  } else {
    chk.classList.add('on');
    li.classList.remove('unchecked');
  }
}

// ==============================================
// タブ切り替え
// ==============================================
function switchTab(tab) {
  var tabs = document.querySelectorAll('.tab-btn');
  tabs[0].classList.toggle('active', tab === 'guidance');
  tabs[1].classList.toggle('active', tab === 'products');

  if (tab === 'guidance') {
    document.getElementById('pg-input').classList.add('active');
    document.getElementById('pg-result').classList.remove('active');
    document.getElementById('pg-products').classList.remove('active');
    document.getElementById('pg-prod-detail').classList.remove('active');
  } else {
    document.getElementById('pg-input').classList.remove('active');
    document.getElementById('pg-result').classList.remove('active');
    document.getElementById('pg-prod-detail').classList.remove('active');
    document.getElementById('pg-products').classList.add('active');
  }
  window.scrollTo(0, 0);
}

// ==============================================
// 製品ボタン初期化
// ==============================================
function initProducts() {
  var grid = document.getElementById('prod-grid');
  PRODUCTS.forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'prod-btn';
    btn.innerHTML = '<span class="prod-icon">' + p.icon + '</span>' + p.name;
    btn.onclick = function() { showProduct(p.id); };
    grid.appendChild(btn);
  });
}

// ==============================================
// 製品詳細表示
// ==============================================
function showProduct(id) {
  var p = null;
  PRODUCTS.forEach(function(x) { if (x.id === id) p = x; });
  if (!p) return;

  var html = '';
  html += '<div class="prod-name">' + p.icon + ' ' + esc(p.name) + '</div>';
  html += '<div class="prod-sub">' + esc(p.sub).replace(/\n/g,'<br>') + '</div>';
  p.tags.forEach(function(t) { html += '<span class="prod-tag">' + esc(t) + '</span>'; });
  html += '<div style="margin-bottom:14px;"></div>';

  html += '<div class="prod-section"><div class="prod-section-ttl">✨ 特長・成分</div>';
  p.features.forEach(function(f) { html += '<div class="prod-item">' + esc(f) + '</div>'; });
  html += '</div>';

  html += '<div class="prod-section"><div class="prod-section-ttl">📋 使い方</div>';
  p.usage.forEach(function(u) { html += '<div class="prod-item">' + esc(u) + '</div>'; });
  html += '</div>';

  html += '<div class="prod-section"><div class="prod-section-ttl">👤 こんな方におすすめ</div>';
  p.recommend.forEach(function(r) { html += '<div class="prod-item">' + esc(r) + '</div>'; });
  html += '</div>';

  html += '<div class="add-box"><div class="add-ttl">💬 スタッフへのポイント</div>';
  p.points.forEach(function(pt) {
    html += '<div class="add-row"><span class="badge">POINT</span><span>' + esc(pt) + '</span></div>';
  });
  html += '</div>';

  document.getElementById('prod-detail-body').innerHTML = html;
  document.getElementById('pg-products').classList.remove('active');
  document.getElementById('pg-prod-detail').classList.add('active');
  window.scrollTo(0, 0);
}

function goBackProd() {
  document.getElementById('pg-prod-detail').classList.remove('active');
  document.getElementById('pg-products').classList.add('active');
  window.scrollTo(0, 0);
}

initButtons();
initProducts();
</script>
